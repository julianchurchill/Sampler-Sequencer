name: sampler_sequencer
description: A hardware-style drum machine and step sequencer app.
publish_to: 'none'
version: 2.3.9+35

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: 6.6.0
  file_picker: 8.3.7
  package_info_plus: 8.3.1
  provider: 6.1.5+1
  path_provider: 2.1.5
  record: 6.2.0
  shared_preferences: 2.5.5
  share_plus: 10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.2
  mocktail: 1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
