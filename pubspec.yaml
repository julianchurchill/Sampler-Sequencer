name: sampler_sequencer
description: A hardware-style drum machine and step sequencer app.
publish_to: 'none'
version: 2.3.1+27

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  file_picker: ^8.0.0
  package_info_plus: ^8.0.0
  provider: ^6.1.1
  path_provider: ^2.1.0
  record: ^6.0.0
  shared_preferences: ^2.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
